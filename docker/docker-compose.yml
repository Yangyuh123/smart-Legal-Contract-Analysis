version: '3.8'

services:
  # MySQL 使用本地安装的即可，此处不再启动容器
  # 如需 Docker MySQL，取消注释并改端口为 3307

  redis:
    image: redis:7-alpine
    container_name: smartlegal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123456
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
