global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'smartlegal-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'spring-boot'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: 'smartlegal-backend'

  - job_name: 'fastapi'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          application: 'smartlegal-ai-agent'

  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql:3306']
        labels:
          application: 'smartlegal-mysql'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          application: 'smartlegal-redis'
