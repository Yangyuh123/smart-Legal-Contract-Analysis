server:
  port: 8080

spring:
  application:
    name: smartlegal-backend
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.smartlegal.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: c21hcnRsZWdhbC1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tMjAyNA==
  expiration: 7200000        # 2小时
  refresh-expiration: 604800000  # 7天

# AI Agent配置
ai-agent:
  base-url: http://localhost:8000
  timeout: 120000

# 文件存储
file:
  upload-dir: ./uploads
  allowed-types: pdf,docx,doc

# Knife4j 接口文档
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
